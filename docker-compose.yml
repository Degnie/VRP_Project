version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.3
    environment:
      POSTGRES_DB: vrp_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: vrp_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # OSRM: requiere el mapa pre-procesado en ./data/osrm (ver `make osrm-prepare`).
  # No se levanta con `docker-compose up` si ese paso no se corrió antes.
  osrm:
    image: osrm/osrm-backend
    command: osrm-routed --algorithm mld /data/lima-latest.osrm
    ports:
      - "5000:5000"
    volumes:
      - ./data/osrm:/data

volumes:
  postgres_data:
  mongo_data:
